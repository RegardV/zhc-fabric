name: zhc-fabric
version: "0.1.0"
description: >
  Multi-view consensus fabric for Hermes: Erlang/OTP sidecar in Docker
  (actors, supervision, leases) behind HTTP :7733. Tools fabric_status,
  fabric_consensus, fabric_fanout. No Hermes core patches. Requires Docker;
  no host Erlang install.
author: zhc-fabric / RealAndWorks garage lab
homepage: https://github.com/RegardV/zhc-fabric
provides_tools:
  - fabric_status
  - fabric_consensus
  - fabric_fanout
provides_hooks:
  - on_session_start
provides_commands:
  - fabric
# Configure via scripts/setup.sh (--wizard or --manual); see after-install.md
