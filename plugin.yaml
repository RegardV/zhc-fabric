name: zhc-fabric
version: "0.1.0"
description: >
  Sidecar multi-model consensus fabric. Parallel propose/critique/vote via
  an external service (default http://127.0.0.1:7733). Does not modify Hermes core.
author: Zero-Human Company
provides_tools:
  - fabric_status
  - fabric_consensus
  - fabric_fanout
provides_hooks:
  - on_session_start
provides_commands:
  - fabric
# No requires_env — install does not force URL/key prompts.
# Configure via: scripts/setup.sh (--wizard or --manual), see after-install.md
